name: CI

# The engine eats its own dog food: it runs THROUGH the gate it ships. This job
# shrinks to `setup-uv-cached → uv run tc-fitness run` — the SAME binary a local
# run invokes (reading the SAME [tool.tc_fitness] block in pyproject.toml), so
# the gate has one definition and local == CI by construction. The gate's STEPS
# (ruff / format / mypy / pytest / branch-naming) are config in pyproject, never
# hand-copied YAML here. The gate runs on Python 3.12 — the `requires-python >= 3.12`
# floor and the interpreter the python-quality-gate reusable defaults to.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Pinned + cached uv install (org standard). `--all-extras` provisions the
      # `dev` optional-dependency group (ruff / mypy / pytest …) into the locked
      # .venv, so the gate step runs the CI-equivalent toolchain.
      - name: Locked uv install (org composite)
        uses: three-cubes/tc-pipelines/actions/setup-uv-cached@d0b27934d2906b8913420cd37a4134dd52cf80f3 # v1
        with:
          python-version: "3.12"
          sync-args: "--all-extras"

      # The single runnable gate. Reads [tool.tc_fitness] and runs ruff / format
      # / mypy --strict / pytest / branch-naming in order. `--no-sync --no-build`:
      # the env is already synced from the LOCKED lockfile above.
      - name: Self gate (tc-fitness run)
        run: uv run --no-sync --no-build tc-fitness run
